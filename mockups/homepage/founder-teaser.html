<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AOJ Mockup - Founder Teaser</title>
  <style>
    @font-face { font-family: "PastaWineBig"; src: url("../../assets/fonts/Pasta and Wine/Regular Fonts/Pasta & Wine Big.otf") format("opentype"); }
    @font-face { font-family: "DMSans"; src: url("../../assets/fonts/DM_Sans/DMSans-VariableFont_opsz,wght.ttf") format("truetype"); }
    :root { --ink:#161616; --canvas:#f6f3ee; --yellow:#f4ba16; --ink20:rgba(22,22,22,.2); }
    body { margin: 0; background: var(--canvas); color: var(--ink); font-family: "DMSans", sans-serif; }
    .wrap { max-width: 1180px; margin: 0 auto; padding: clamp(40px, 8vw, 96px) clamp(20px, 5vw, 48px); display: grid; grid-template-columns: 1fr 1.1fr; gap: 28px; align-items: center; }
    .photo { border: 1px solid var(--ink20); background: #f0ece5; overflow: hidden; }
    .photo img { width: 100%; height: 100%; object-fit: cover; aspect-ratio: 4 / 5; }
    h2 { margin: 0 0 12px; font: 400 clamp(1.8rem, 4vw, 3.2rem)/1 "PastaWineBig", serif; max-width: 12ch; }
    p { margin: 0 0 12px; line-height: 1.55; max-width: 46ch; }
    .cta { display: inline-block; margin-top: 8px; text-decoration: none; border: 2px solid var(--ink); background: transparent; color: var(--ink); padding: 12px 20px; text-transform: uppercase; letter-spacing: .08em; font-size: .8rem; }
    .cta:hover { background: var(--yellow); }
    @media (max-width: 900px) { .wrap { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <section class="wrap">
    <figure class="photo">
      <img src="../../assets/images/IMG_4397.jpeg" alt="Founder portrait teaser" />
    </figure>
    <div>
      <h2>Meet the Founder</h2>
      <p>Anatomy of Joy started with one question: how do we keep the stories that shape us close, visible, and alive in daily life?</p>
      <p>Each AOJ piece is built to feel warm, human, and intentional. Not just beautiful, but deeply personal.</p>
      <a class="cta" href="#">Read Our Story</a>
    </div>
  </section>
</body>
</html>
