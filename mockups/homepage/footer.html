<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AOJ Mockup - Footer</title>
  <style>
    @font-face { font-family: "PastaWineLittle"; src: url("../../assets/fonts/Pasta and Wine/Regular Fonts/Pasta & Wine Little.otf") format("opentype"); }
    @font-face { font-family: "DMSans"; src: url("../../assets/fonts/DM_Sans/DMSans-VariableFont_opsz,wght.ttf") format("truetype"); }
    :root { --ink:#161616; --canvas:#f6f3ee; --yellow:#f4ba16; --ink20:rgba(22,22,22,.2); }
    body { margin: 0; background: var(--ink); color: var(--canvas); font-family: "DMSans", sans-serif; }
    .wrap { max-width: 1280px; margin: 0 auto; padding: clamp(32px, 7vw, 80px) clamp(20px, 5vw, 48px) 28px; }
    .top { display: grid; grid-template-columns: 1.1fr repeat(3, minmax(120px,1fr)); gap: 18px; border-bottom: 1px solid rgba(246,243,238,.2); padding-bottom: 26px; }
    .brand img { width: min(260px, 80%); filter: brightness(0) invert(1); }
    .tag { margin-top: 10px; font: 400 1.2rem/1.2 "PastaWineLittle", serif; max-width: 16ch; }
    h3 { margin: 0 0 10px; text-transform: uppercase; letter-spacing: .08em; font-size: .75rem; color: var(--yellow); }
    ul { margin: 0; padding: 0; list-style: none; display: grid; gap: 8px; }
    a { color: var(--canvas); text-decoration: none; border-bottom: 1px solid transparent; }
    a:hover { border-bottom-color: var(--yellow); }
    .bottom { display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; padding-top: 16px; font-size: .8rem; text-transform: uppercase; letter-spacing: .06em; }
    @media (max-width: 900px) { .top { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 640px) { .top { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <footer class="wrap">
    <div class="top">
      <div class="brand">
        <img src="../../assets/logo/AOJ Wordmark.png" alt="Anatomy of Joy" />
        <p class="tag">Stories, illustrated into keepsakes.</p>
      </div>
      <nav>
        <h3>Shop</h3>
        <ul>
          <li><a href="#">All Stories</a></li>
          <li><a href="#">Custom Orders</a></li>
          <li><a href="#">Gift Cards</a></li>
        </ul>
      </nav>
      <nav>
        <h3>About</h3>
        <ul>
          <li><a href="#">Our Story</a></li>
          <li><a href="#">How It Works</a></li>
          <li><a href="#">FAQ</a></li>
        </ul>
      </nav>
      <nav>
        <h3>Contact</h3>
        <ul>
          <li><a href="#">hello@anatomyofjoy.com</a></li>
          <li><a href="#">Instagram</a></li>
          <li><a href="#">Pinterest</a></li>
        </ul>
      </nav>
    </div>
    <div class="bottom">
      <span>Copyright 2026 Anatomy of Joy</span>
      <span>Built on Shopify</span>
    </div>
  </footer>
</body>
</html>
