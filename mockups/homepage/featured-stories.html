<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AOJ Mockup - Featured Stories</title>
  <style>
    @font-face { font-family: "PastaWineBig"; src: url("../../assets/fonts/Pasta and Wine/Regular Fonts/Pasta & Wine Big.otf") format("opentype"); }
    @font-face { font-family: "PastaWineLittle"; src: url("../../assets/fonts/Pasta and Wine/Regular Fonts/Pasta & Wine Little.otf") format("opentype"); }
    @font-face { font-family: "DMSans"; src: url("../../assets/fonts/DM_Sans/DMSans-VariableFont_opsz,wght.ttf") format("truetype"); }
    :root { --ink:#161616; --canvas:#f6f3ee; --yellow:#f4ba16; --ink20:rgba(22,22,22,.2); }
    body { margin: 0; background: var(--canvas); color: var(--ink); font-family: "DMSans", sans-serif; }
    .wrap { max-width: 1280px; margin: 0 auto; padding: clamp(40px, 8vw, 96px) clamp(20px, 5vw, 48px); }
    .top { display: flex; justify-content: space-between; align-items: end; gap: 20px; margin-bottom: 24px; }
    h2 { margin: 0; font: 400 clamp(1.8rem, 4vw, 3.2rem)/1 "PastaWineBig", serif; }
    .ui { text-transform: uppercase; letter-spacing: .09em; font-size: .78rem; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 18px; }
    .card { border: 1px solid var(--ink20); background: #fbf9f5; }
    .media { position: relative; aspect-ratio: 1 / 1; overflow: hidden; }
    .media img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity .28s ease; }
    .media img.alt { opacity: 0; }
    .card:hover .media img.alt { opacity: 1; }
    .card:hover .media img.main { opacity: 0; }
    .meta { padding: 16px; display: grid; gap: 6px; }
    .title { margin: 0; font: 400 1.4rem/1.1 "PastaWineLittle", serif; }
    .desc { margin: 0; line-height: 1.45; }
    .cta { margin-top: 8px; display: inline-block; border-bottom: 2px solid var(--yellow); text-decoration: none; color: var(--ink); font-size: .85rem; text-transform: uppercase; letter-spacing: .08em; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <section class="wrap">
    <div class="top">
      <h2>Featured Stories</h2>
      <p class="ui">2-up desktop, 1-up mobile</p>
    </div>
    <div class="grid">
      <article class="card">
        <div class="media">
          <img class="main" src="../../assets/images/Susan_Savage outdoors.png" alt="Featured story Susan Savage" />
          <img class="alt" src="../../assets/images/Susan_Savage diagonally.png" alt="Alternate story image Susan Savage" />
        </div>
        <div class="meta">
          <h3 class="title">Susan's Savannah Story</h3>
          <p class="desc">A layered composition of hometown streets, family roots, and handwritten details.</p>
          <a class="cta" href="#">Customize This Story</a>
        </div>
      </article>
      <article class="card">
        <div class="media">
          <img class="main" src="../../assets/images/Timmeka_Perkins integrated into hairstyle.png" alt="Featured story Timmeka Perkins" />
          <img class="alt" src="../../assets/images/Timmeka_Perkins over the hand.png" alt="Alternate story image Timmeka Perkins" />
        </div>
        <div class="meta">
          <h3 class="title">Timmeka's Milestone Gift</h3>
          <p class="desc">A custom scarf honoring years of friendship, travel, and shared joy.</p>
          <a class="cta" href="#">Customize This Story</a>
        </div>
      </article>
    </div>
  </section>
</body>
</html>
